<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Void: Zero Gravity</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body class="hardcore-theme">
    <div id="game-wrapper" class="glitch-container">
        <div id="hud">
            <div class="hud-left">
                <div class="label">ENERGY</div>
                <div class="energy-container">
                    <div id="energy-bar"></div>
                </div>
            </div>
            <div class="hud-center">
                <div id="score" class="score-display">000000</div>
                <div id="lives" class="lives-display">❤️❤️❤️</div>
            </div>
            <div class="hud-right">
                <div class="label">LEVEL</div>
                <div id="level" class="level-display">01</div>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>
        <div id="notif-bar"></div>

        <div id="overlay">
            <div id="menu-start" class="screen active">
                <h1 class="glitch" data-text="NEON VOID">NEON VOID</h1>
                <h2 class="subtitle">ZERO GRAVITY</h2>
                <div class="warning">WARNING: HARDCORE DIFFICULTY ENABLED</div>
                <p class="mission">에너지가 방전되기 전에 모든 장벽을 파괴하십시오.</p>
                <div class="controls-guide">
                    <span>[MOUSE] / [ARROW KEYS] TO MOVE</span>
                    <span>[SPACE] TO PULSE</span>
                </div>
                <button id="btn-start" class="cyber-button">INITIALIZE</button>
            </div>

            <div id="menu-gameover" class="screen">
                <h1 class="critical">VOID CONSUMED YOU</h1>
                <div class="stat">SCORE: <span id="final-score">0</span></div>
                <button id="btn-retry" class="cyber-button red">REBOOT SYSTEM</button>
            </div>
        </div>

        <div id="vfx-layer"></div>
    </div>

    <!-- Preload some glitch sounds/placeholders if needed in future -->
    <script src="game.js"></script>
</body>
</html>
